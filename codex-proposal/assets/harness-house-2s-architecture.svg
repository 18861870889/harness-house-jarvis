<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1500" viewBox="0 0 1200 1500" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Harness House 2s Latency First Architecture</title>
  <desc id="desc">Simplified latency-first command execution architecture for Harness House.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52606d; }
      .box-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .box-note { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46515d; }
      .tiny { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52606d; }
      .tag-text { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #394452; }
      .box { stroke-width: 1.8; rx: 14; }
      .main { fill: #eaf7f0; stroke: #75c790; }
      .entry { fill: #e8f1ff; stroke: #8ab4f8; }
      .fast { fill: #e8fbfb; stroke: #68c7c7; }
      .llm { fill: #f1ecff; stroke: #a996f5; }
      .safe { fill: #ffeceb; stroke: #ec8b82; }
      .device { fill: #fff1df; stroke: #e2a75b; }
      .async { fill: #eef2f6; stroke: #a5b1be; stroke-dasharray: 8 6; }
      .tag { fill: #ffffff; stroke: #d5dbe3; rx: 10; }
      .arrow { stroke: #52606d; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #7b8794; stroke-width: 2.2; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 8 7; }
      .arrow-red { stroke: #d64545; stroke-width: 2.8; fill: none; marker-end: url(#arrow-red); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52606d"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8794"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d64545"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1500"/>

  <text class="title" x="55" y="60">Harness House 2s 架构</text>
  <text class="subtitle" x="55" y="92">常见命令走 Fast Path；模糊命令最多一次 LLM；进化和记忆后台异步</text>

  <rect class="tag" x="55" y="118" width="250" height="38"/>
  <text class="tag-text" x="75" y="142">目标：150ms-2s 返回结果</text>
  <rect class="tag" x="325" y="118" width="265" height="38"/>
  <text class="tag-text" x="345" y="142">LLM: no-think JSON only</text>
  <rect class="tag" x="610" y="118" width="290" height="38"/>
  <text class="tag-text" x="630" y="142">HA-first, connector-ready</text>

  <!-- Main chain -->
  <rect class="box entry" x="365" y="195" width="470" height="76"/>
  <text class="box-title" x="535" y="225">User Command</text>
  <text class="box-note" x="482" y="249">微信 / Web / API / 语音后续</text>

  <path class="arrow" d="M600 271 L600 315"/>

  <rect class="box main" x="365" y="315" width="470" height="80"/>
  <text class="box-title" x="498" y="346">Interaction Gateway</text>
  <text class="box-note" x="470" y="371">收消息，生成 command request</text>

  <path class="arrow" d="M600 395 L600 440"/>

  <rect class="box main" x="365" y="440" width="470" height="80"/>
  <text class="box-title" x="522" y="471">Command Router</text>
  <text class="box-note" x="438" y="496">先查缓存/规则；不确定才调用 LLM</text>

  <!-- Context side -->
  <rect class="box async" x="55" y="415" width="245" height="130"/>
  <text class="box-title" x="99" y="450">Context Snapshot</text>
  <text class="box-note" x="86" y="476">后台持续维护</text>
  <text class="box-note" x="86" y="500">人在 / 房间 / 状态</text>
  <text class="box-note" x="86" y="524">主链路只读取</text>
  <path class="arrow-soft" d="M300 480 L365 480"/>

  <!-- Branches -->
  <path class="arrow" d="M520 520 L310 600"/>
  <path class="arrow" d="M680 520 L890 600"/>

  <rect class="box fast" x="75" y="600" width="390" height="110"/>
  <text class="box-title" x="160" y="635">Fast Path Parser</text>
  <text class="box-note" x="124" y="663">别名 / 常用命令 / 规则 / 缓存</text>
  <text class="tiny" x="173" y="691">10-50 ms, no LLM</text>

  <rect class="box llm" x="735" y="600" width="390" height="110"/>
  <text class="box-title" x="843" y="635">LLM Intent Parser</text>
  <text class="box-note" x="785" y="663">一次 no-think 调用，输出短 JSON</text>
  <text class="tiny" x="815" y="691">600-1200 ms target</text>

  <path class="arrow" d="M270 710 L270 790 L600 790"/>
  <path class="arrow" d="M930 710 L930 790 L600 790"/>
  <path class="arrow" d="M600 790 L600 835"/>

  <rect class="box main" x="365" y="835" width="470" height="80"/>
  <text class="box-title" x="523" y="866">Plan Validator</text>
  <text class="box-note" x="462" y="891">schema 校验，设备解析，动作规整</text>

  <path class="arrow" d="M600 915 L600 960"/>

  <rect class="box safe" x="365" y="960" width="470" height="80"/>
  <text class="box-title" x="535" y="991">Safety Gate</text>
  <text class="box-note" x="450" y="1016">低风险执行；中高风险确认或阻断</text>

  <path class="arrow-red" d="M600 1040 L600 1085"/>

  <rect class="box main" x="365" y="1085" width="470" height="80"/>
  <text class="box-title" x="535" y="1116">Device Executor</text>
  <text class="box-note" x="448" y="1141">下发命令，返回 accepted/executed/failed</text>

  <path class="arrow" d="M600 1165 L600 1210"/>

  <rect class="box device" x="365" y="1210" width="470" height="80"/>
  <text class="box-title" x="500" y="1241">Home Assistant Connector</text>
  <text class="box-note" x="468" y="1266">P0 真实设备入口，后续可替换/扩展</text>

  <path class="arrow" d="M600 1290 L600 1335"/>

  <rect class="box device" x="135" y="1335" width="930" height="88"/>
  <text class="box-title" x="505" y="1367">Physical Devices</text>
  <text class="box-note" x="228" y="1393">开关 / 空调 / 风扇 / 窗帘 / 电视 / 猫粮机 / 扫地机器人 / 传感器 / 监控 / 燃气热水器</text>

  <!-- Result stream -->
  <path class="arrow" d="M835 1125 L1040 1125 L1040 315 L835 315"/>
  <rect class="tag" x="860" y="1010" width="275" height="58"/>
  <text class="tag-text" x="882" y="1035">Result Stream</text>
  <text class="tiny" x="882" y="1056">2s 内返回执行/确认/失败原因</text>

  <!-- Async worker -->
  <rect class="box async" x="55" y="1005" width="245" height="160"/>
  <text class="box-title" x="88" y="1040">Audit + Evolution</text>
  <text class="box-note" x="83" y="1068">后台消费日志</text>
  <text class="box-note" x="83" y="1092">生成候选偏好</text>
  <text class="box-note" x="83" y="1116">用户确认后生效</text>
  <text class="tiny" x="83" y="1145">not in critical path</text>
  <path class="arrow-soft" d="M365 1125 L300 1125"/>

  <rect class="tag" x="135" y="1450" width="930" height="38"/>
  <text class="tag-text" x="178" y="1475">SLA 定义：2 秒内返回“已执行、已下发、需确认或失败原因”；慢设备完成状态异步更新</text>
</svg>
