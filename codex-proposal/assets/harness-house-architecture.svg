<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1600" viewBox="0 0 1600 1600" role="img" aria-labelledby="title desc">
  <title id="title">Harness House Hermes-Inspired Architecture</title>
  <desc id="desc">A safety-first open-source AI smart home framework architecture inspired by Hermes.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fa; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52606d; }
      .group-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .group-note { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5c6673; }
      .box-title { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .box-note { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #46515d; }
      .small { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #52606d; }
      .group { stroke: #c8d0d9; stroke-width: 1.5; rx: 18; }
      .entry { fill: #e8f1ff; stroke: #8ab4f8; }
      .event { fill: #fef6e7; stroke: #f5b64c; }
      .core { fill: #eaf7f0; stroke: #75c790; }
      .agent { fill: #f1ecff; stroke: #a996f5; }
      .policy { fill: #ffeceb; stroke: #ec8b82; }
      .data { fill: #eef2f6; stroke: #a5b1be; }
      .connector { fill: #e8fbfb; stroke: #68c7c7; }
      .device { fill: #fff1df; stroke: #e2a75b; }
      .box { stroke-width: 1.6; rx: 12; }
      .arrow { stroke: #52606d; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #7b8794; stroke-width: 1.8; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 7 6; }
      .arrow-risk { stroke: #d64545; stroke-width: 2.4; fill: none; marker-end: url(#arrow-risk); }
      .tag { fill: #ffffff; stroke: #d5dbe3; rx: 10; }
      .tag-text { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #394452; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52606d"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7b8794"/>
    </marker>
    <marker id="arrow-risk" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d64545"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1600"/>

  <text class="title" x="60" y="58">Harness House 架构图</text>
  <text class="subtitle" x="60" y="88">Hermes-style interaction, safety-first execution, connector-based open framework</text>

  <rect class="tag" x="1120" y="38" width="200" height="34"/>
  <text class="tag-text" x="1138" y="60">Home Assistant-first</text>
  <rect class="tag" x="1335" y="38" width="205" height="34"/>
  <text class="tag-text" x="1353" y="60">not Home Assistant-only</text>

  <!-- Interaction Layer -->
  <rect class="group entry" x="50" y="125" width="650" height="170"/>
  <text class="group-title" x="75" y="160">Interaction Layer / Hermes-style Entry</text>
  <text class="group-note" x="75" y="184">统一入口，只负责收消息、回消息、展示计划，不直接控制设备</text>

  <rect class="box entry" x="75" y="210" width="110" height="55"/>
  <text class="box-title" x="101" y="234">WeChat</text>
  <text class="box-note" x="101" y="254">Bot</text>

  <rect class="box entry" x="200" y="210" width="120" height="55"/>
  <text class="box-title" x="225" y="234">Telegram</text>
  <text class="box-note" x="240" y="254">Bot</text>

  <rect class="box entry" x="335" y="210" width="120" height="55"/>
  <text class="box-title" x="358" y="234">Web</text>
  <text class="box-note" x="360" y="254">Console</text>

  <rect class="box entry" x="470" y="210" width="100" height="55"/>
  <text class="box-title" x="496" y="234">Voice</text>
  <text class="box-note" x="493" y="254">later</text>

  <rect class="box entry" x="585" y="210" width="90" height="55"/>
  <text class="box-title" x="613" y="234">API</text>
  <text class="box-note" x="605" y="254">Open</text>

  <!-- Event Sources -->
  <rect class="group event" x="750" y="125" width="800" height="170"/>
  <text class="group-title" x="775" y="160">Event Sources</text>
  <text class="group-note" x="775" y="184">用户指令、传感器、定时、设备状态变化都会进入同一事件流</text>

  <rect class="box event" x="775" y="210" width="130" height="55"/>
  <text class="box-title" x="807" y="234">User</text>
  <text class="box-note" x="798" y="254">Commands</text>

  <rect class="box event" x="920" y="210" width="130" height="55"/>
  <text class="box-title" x="947" y="234">Sensor</text>
  <text class="box-note" x="956" y="254">Events</text>

  <rect class="box event" x="1065" y="210" width="140" height="55"/>
  <text class="box-title" x="1094" y="234">Device</text>
  <text class="box-note" x="1094" y="254">Changes</text>

  <rect class="box event" x="1220" y="210" width="125" height="55"/>
  <text class="box-title" x="1248" y="234">Timer</text>
  <text class="box-note" x="1240" y="254">Schedule</text>

  <rect class="box event" x="1360" y="210" width="155" height="55"/>
  <text class="box-title" x="1402" y="234">Weather</text>
  <text class="box-note" x="1392" y="254">External</text>

  <!-- Core -->
  <rect class="group core" x="50" y="340" width="1040" height="470"/>
  <text class="group-title" x="75" y="375">Harness House Core</text>
  <text class="group-note" x="75" y="399">核心框架：事件路由、AI 规划、规则、策略、执行全部在这里隔离</text>

  <rect class="box core" x="90" y="430" width="170" height="70"/>
  <text class="box-title" x="122" y="459">Gateway</text>
  <text class="box-note" x="116" y="481">message to event</text>

  <rect class="box core" x="320" y="430" width="170" height="70"/>
  <text class="box-title" x="365" y="459">Event Bus</text>
  <text class="box-note" x="359" y="481">single stream</text>

  <rect class="box core" x="550" y="430" width="190" height="70"/>
  <text class="box-title" x="593" y="459">Router</text>
  <text class="box-note" x="586" y="481">intent / event route</text>

  <rect class="box core" x="95" y="555" width="190" height="85"/>
  <text class="box-title" x="140" y="584">Rule Engine</text>
  <text class="box-note" x="125" y="607">known deterministic</text>
  <text class="box-note" x="150" y="626">flows</text>

  <rect class="box core" x="315" y="555" width="190" height="85"/>
  <text class="box-title" x="358" y="584">Scene Engine</text>
  <text class="box-note" x="346" y="607">sleep / home / away</text>
  <text class="box-note" x="368" y="626">movie</text>

  <rect class="box agent" x="535" y="555" width="200" height="85"/>
  <text class="box-title" x="588" y="584">AI Planner</text>
  <text class="box-note" x="568" y="607">intent, disambiguation</text>
  <text class="box-note" x="582" y="626">plan generation</text>

  <rect class="box data" x="790" y="430" width="250" height="210"/>
  <text class="box-title" x="850" y="462">Context Graph</text>
  <text class="box-note" x="830" y="492">rooms, presence, state</text>
  <text class="box-note" x="830" y="516">device capability model</text>
  <text class="box-note" x="830" y="540">user preferences</text>
  <text class="box-note" x="830" y="564">time and environment</text>
  <text class="box-note" x="830" y="588">risk context</text>

  <rect class="box policy" x="270" y="695" width="230" height="80"/>
  <text class="box-title" x="326" y="725">Safety Guardian</text>
  <text class="box-note" x="304" y="748">risk, permission, confirm</text>

  <rect class="box core" x="570" y="695" width="230" height="80"/>
  <text class="box-title" x="625" y="725">Plan Executor</text>
  <text class="box-note" x="604" y="748">queue, retry, snapshot</text>

  <rect class="box agent" x="840" y="695" width="210" height="80"/>
  <text class="box-title" x="883" y="725">Evolution Engine</text>
  <text class="box-note" x="865" y="748">candidate memories/rules</text>

  <!-- Data Layer -->
  <rect class="group data" x="1130" y="340" width="420" height="470"/>
  <text class="group-title" x="1155" y="375">Data &amp; Memory Layer</text>
  <text class="group-note" x="1155" y="399">所有计划、状态、偏好、规则、审计都可查</text>

  <rect class="box data" x="1160" y="430" width="165" height="60"/>
  <text class="box-title" x="1187" y="456">Device Registry</text>
  <text class="box-note" x="1196" y="476">devices/capabilities</text>

  <rect class="box data" x="1350" y="430" width="165" height="60"/>
  <text class="box-title" x="1390" y="456">State Store</text>
  <text class="box-note" x="1380" y="476">latest + history</text>

  <rect class="box data" x="1160" y="525" width="165" height="60"/>
  <text class="box-title" x="1184" y="551">Preference DB</text>
  <text class="box-note" x="1187" y="571">visible memories</text>

  <rect class="box data" x="1350" y="525" width="165" height="60"/>
  <text class="box-title" x="1394" y="551">Rule Store</text>
  <text class="box-note" x="1388" y="571">active rules</text>

  <rect class="box data" x="1160" y="620" width="165" height="60"/>
  <text class="box-title" x="1204" y="646">Audit Log</text>
  <text class="box-note" x="1188" y="666">why / what / result</text>

  <rect class="box data" x="1350" y="620" width="165" height="60"/>
  <text class="box-title" x="1392" y="646">Policy Log</text>
  <text class="box-note" x="1384" y="666">blocked/confirmed</text>

  <rect class="box data" x="1160" y="715" width="355" height="60"/>
  <text class="box-title" x="1218" y="741">Memory Center for User Review</text>
  <text class="box-note" x="1244" y="761">enable / disable / delete / rollback</text>

  <!-- Connectors -->
  <rect class="group connector" x="50" y="860" width="700" height="190"/>
  <text class="group-title" x="75" y="895">Connector Layer</text>
  <text class="group-note" x="75" y="919">Home Assistant 是第一接入层，但不是框架地基</text>

  <rect class="box connector" x="75" y="945" width="110" height="60"/>
  <text class="box-title" x="103" y="970">Fake</text>
  <text class="box-note" x="93" y="990">dev/test</text>

  <rect class="box connector" x="205" y="945" width="150" height="60"/>
  <text class="box-title" x="237" y="970">Home</text>
  <text class="box-note" x="230" y="990">Assistant</text>

  <rect class="box connector" x="375" y="945" width="110" height="60"/>
  <text class="box-title" x="407" y="970">Mi</text>
  <text class="box-note" x="397" y="990">later</text>

  <rect class="box connector" x="505" y="945" width="105" height="60"/>
  <text class="box-title" x="531" y="970">MQTT</text>
  <text class="box-note" x="526" y="990">later</text>

  <rect class="box connector" x="630" y="945" width="95" height="60"/>
  <text class="box-title" x="654" y="970">Matter</text>
  <text class="box-note" x="650" y="990">later</text>

  <!-- Devices -->
  <rect class="group device" x="790" y="860" width="760" height="190"/>
  <text class="group-title" x="815" y="895">Physical Devices</text>
  <text class="group-note" x="815" y="919">你的真实设备会被映射到统一 capability，而不是暴露厂商差异</text>

  <rect class="box device" x="815" y="945" width="115" height="60"/>
  <text class="box-title" x="850" y="970">Switch</text>
  <text class="box-note" x="841" y="990">smart plug</text>

  <rect class="box device" x="945" y="945" width="105" height="60"/>
  <text class="box-title" x="977" y="970">AC</text>
  <text class="box-note" x="974" y="990">fan</text>

  <rect class="box device" x="1065" y="945" width="115" height="60"/>
  <text class="box-title" x="1092" y="970">Curtain</text>
  <text class="box-note" x="1090" y="990">rack</text>

  <rect class="box device" x="1195" y="945" width="105" height="60"/>
  <text class="box-title" x="1230" y="970">TV</text>
  <text class="box-note" x="1219" y="990">media</text>

  <rect class="box device" x="1315" y="945" width="105" height="60"/>
  <text class="box-title" x="1343" y="970">Robot</text>
  <text class="box-note" x="1336" y="990">washer</text>

  <rect class="box device" x="1435" y="945" width="90" height="60"/>
  <text class="box-title" x="1457" y="970">Pet</text>
  <text class="box-note" x="1450" y="990">feeder</text>

  <rect class="box device" x="885" y="1020" width="130" height="55"/>
  <text class="box-title" x="928" y="1044">Gas</text>
  <text class="box-note" x="909" y="1064">water heater</text>

  <rect class="box device" x="1040" y="1020" width="135" height="55"/>
  <text class="box-title" x="1075" y="1044">Sensors</text>
  <text class="box-note" x="1060" y="1064">presence/window</text>

  <rect class="box device" x="1200" y="1020" width="125" height="55"/>
  <text class="box-title" x="1233" y="1044">Camera</text>
  <text class="box-note" x="1224" y="1064">privacy risk</text>

  <rect class="box device" x="1350" y="1020" width="135" height="55"/>
  <text class="box-title" x="1376" y="1044">Vendor API</text>
  <text class="box-note" x="1388" y="1064">fallback</text>

  <!-- Main arrows -->
  <path class="arrow" d="M375 295 L375 390 L175 390 L175 430"/>
  <path class="arrow" d="M1150 295 L1150 318 L405 318 L405 430"/>
  <path class="arrow" d="M260 465 L320 465"/>
  <path class="arrow" d="M490 465 L550 465"/>
  <path class="arrow" d="M645 500 L645 530 L190 530 L190 555"/>
  <path class="arrow" d="M645 500 L645 530 L410 530 L410 555"/>
  <path class="arrow" d="M645 500 L645 555"/>
  <path class="arrow" d="M285 598 L385 598 L385 695"/>
  <path class="arrow" d="M505 598 L385 598 L385 695"/>
  <path class="arrow" d="M635 640 L635 667 L385 667 L385 695"/>
  <path class="arrow-risk" d="M500 735 L570 735"/>
  <path class="arrow" d="M800 735 L840 735"/>
  <path class="arrow" d="M685 775 L685 835 L280 835 L280 945"/>
  <path class="arrow" d="M685 775 L685 835 L430 835 L430 945"/>
  <path class="arrow" d="M685 775 L685 835 L557 835 L557 945"/>
  <path class="arrow" d="M685 775 L685 835 L677 835 L677 945"/>
  <path class="arrow" d="M355 975 L790 975"/>
  <path class="arrow" d="M355 975 L790 1050 L885 1050"/>

  <!-- Context/data arrows -->
  <path class="arrow-soft" d="M790 535 L735 595"/>
  <path class="arrow-soft" d="M790 535 L505 598"/>
  <path class="arrow-soft" d="M790 535 L285 598"/>
  <path class="arrow-soft" d="M1090 460 L1160 460"/>
  <path class="arrow-soft" d="M1090 520 L1350 460"/>
  <path class="arrow-soft" d="M1090 555 L1160 555"/>
  <path class="arrow-soft" d="M1090 590 L1350 555"/>
  <path class="arrow-soft" d="M800 735 L1160 650"/>
  <path class="arrow-soft" d="M1050 735 L1160 745"/>
  <path class="arrow-soft" d="M1242 680 L945 695"/>
  <path class="arrow-soft" d="M1242 585 L945 695"/>

  <!-- Callouts -->
  <rect class="tag" x="80" y="1095" width="460" height="42"/>
  <text class="tag-text" x="100" y="1121">核心取舍：LLM 负责理解与规划，不直接触碰设备 API</text>

  <rect class="tag" x="570" y="1095" width="450" height="42"/>
  <text class="tag-text" x="590" y="1121">所有动作必须经过 Safety Guardian 和 Audit Log</text>

  <rect class="tag" x="1050" y="1095" width="430" height="42"/>
  <text class="tag-text" x="1070" y="1121">自进化先做候选偏好，确认后才固化为规则</text>
</svg>
